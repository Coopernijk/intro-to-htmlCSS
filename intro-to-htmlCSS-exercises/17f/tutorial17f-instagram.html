<html>

  <head>
   <title>Lesson 17 Excercises - More CSS Features</title>
   <link rel="stylesheet" href="assets/tutorial17f-instagram.css">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

<body>
  
  <section class="upper-part">

    <section class="left-part">
      <img class="ig-icon" src="assets/freepnglogos.com-instagram-icon-33471.png" alt="">
      <div class="left-part-centre">
        <p class="slogan">See everyday moments from your close friends.</p>
        <img class="bg-image" src="assets/static.cdninstagram.com-nWfBjz-5_uf.png" alt="">
      </div>
    </section>

    <section class="right-part">
      <div class="flex-top">
        <p class="direction">Log into Instagram</p>
        <div class="flex-form1">
          <input class="form" type="email" placeholder="Mobile number, username or email">
          <input class="form" type="password" placeholder="Password">
        </div>
        <div class="flex-form2">
          <button class="button-main blue-mark1">Log in</button>
          <button class="button-main">Forgot password</button>
        </div>
      </div>
      <div class="flex-bottom">
        <button class="flex-button button-main">
          <img class=" img-button" src="assets/facebook-logo.svg" alt="">
          <p>Log in with Facebook</p>
        </button>
        <button class="button-main blue-mark2">Create new account</button>
      </div>
      <img class="meta-loga" src="assets/brandfetch.com-id0D-m9C5l_logos.png" alt="">
    </section>

  </section>

  <footer class="lower-part">
    <div class="footer-container">
      <a href="">Meta</a>
      <a href="">About</a>
      <a href="">Blog</a>
      <a href="">Jobs</a>
      <a href="">Help</a>
      <a href="">API</a>
      <a href="">Privacy</a>
      <a href="">Terms</a>
      <a href="">Locations</a>
      <a href="">Instagram Lite</a>
      <a href="">Meta AI</a>
      <a href="">Threads</a>
      <a href="">Contact Uploading & Non-Users</a>
      <a href="">Meta Verified</a>
      <a href="">Meta in Indonesia</a>
      <form action="">
        <select name="languages" id="">
          <option value="en">English</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="jp">日本語</option>
        </select>
        <span>&#x2304;</span>
      </form>
      <p>© 2026 Instagram from Meta</p>
    </div>
  </footer>

</html>
